<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Licznik Kaucji - Cel 500 000 zł</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2ecc71;
            --secondary: #3498db;
            --dark: #2c3e50;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h1 { font-weight: 900; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        .target { font-size: 0.9rem; opacity: 0.8; margin-bottom: 30px; }

        .counter-display {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 20px 0;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .progress-container {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            height: 25px;
            width: 100%;
            margin-bottom: 40px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2ecc71, #f1c40f);
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            border: none;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .btn-plastic { background: rgba(52, 152, 219, 0.6); }
        .btn-glass { background: rgba(46, 204, 113, 0.6); }

        button:hover {
            transform: translateY(-5px);
            filter: brightness(1.2);
        }

        button:active { transform: scale(0.95); }

        button span { font-size: 0.8rem; opacity: 0.9; }

        .stats {
            margin-top: 30px;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        .alert {
            color: #f1c40f;
            font-weight: bold;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Kaucjometr</h1>
    <div class="target">Cel: 500 000,00 zł</div>

    <div class="counter-display" id="total">0,00 zł</div>

    <div class="progress-container">
        <div class="progress-bar" id="progress"></div>
    </div>

    <div class="button-grid">
        <button class="btn-plastic" onclick="addMoney(0.5)">
            🥤 Puszka / Plastik
            <span>+0,50 zł</span>
        </button>
        <button class="btn-glass" onclick="addMoney(1.0)">
            🍾 Butelka Szklana
            <span>+1,00 zł</span>
        </button>
    </div>

    <div id="max-alert" class="alert">Osiągnięto limit 500 000 zł! 🏆</div>

    <div class="stats">
        <div>Sztuk razem: <span id="count">0</span></div>
        <div>Do celu: <span id="remaining">500 000 zł</span></div>
    </div>
</div>

<script>
    let currentTotal = 0;
    let totalItems = 0;
    const MAX_VAL = 500000;

    function addMoney(amount) {
        if (currentTotal + amount <= MAX_VAL) {
            currentTotal += amount;
            totalItems++;
            updateDisplay();
        } else if (currentTotal < MAX_VAL) {
            currentTotal = MAX_VAL;
            totalItems++;
            updateDisplay();
        }

        if (currentTotal >= MAX_VAL) {
            document.getElementById('max-alert').style.display = 'block';
        }
    }

    function updateDisplay() {
        // Aktualizacja tekstu kwoty
        document.getElementById('total').innerText = currentTotal.toLocaleString('pl-PL', { minimumFractionDigits: 2 }) + ' zł';
        
        // Aktualizacja paska postępu
        const percentage = (currentTotal / MAX_VAL) * 100;
        document.getElementById('progress').style.width = percentage + '%';
        
        // Aktualizacja statystyk
        document.getElementById('count').innerText = totalItems;
        const remaining = MAX_VAL - currentTotal;
        document.getElementById('remaining').innerText = remaining.toLocaleString('pl-PL', { minimumFractionDigits: 2 }) + ' zł';
    }
</script>

</body>
</html>
