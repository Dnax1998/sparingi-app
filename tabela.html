<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking SEMP Warszawa - Live Database</title>
    
    <!-- Skrypty Firebase (Legacy SDK dla prostoty implementacji) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --primary: #c41e3a;
            --dark: #1a1a1a;
            --gold: #fbbf24;
            --silver: #94a3b8;
            --bronze: #a16207;
            --bg-glass: rgba(255, 255, 255, 0.92);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: #000;
            color: #1e293b;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('IMG_3003.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.25;
            filter: blur(8px);
            z-index: -1;
        }

        .container { width: 100%; max-width: 1000px; z-index: 1; }

        .club-header { text-align: center; margin-bottom: 20px; color: white; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }
        .club-logo { height: 120px; margin-bottom: 15px; }

        /* Podium */
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            margin: 30px 0;
            height: 220px;
        }
        .podium-place { display: flex; flex-direction: column; align-items: center; width: 130px; }
        .podium-bar {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 32px;
            border-radius: 12px 12px 0 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .name-tag { 
            font-size: 14px; font-weight: bold; margin-bottom: 10px; color: white; 
            background: rgba(196, 30, 58, 0.85); padding: 4px 10px; border-radius: 12px;
        }
        .first { order: 2; }
        .first .podium-bar { height: 150px; background: linear-gradient(to top, #b45309, var(--gold)); border: 3px solid var(--gold); }
        .second { order: 1; }
        .second .podium-bar { height: 110px; background: linear-gradient(to top, #475569, var(--silver)); border: 3px solid var(--silver); }
        .third { order: 3; }
        .third .podium-bar { height: 80px; background: linear-gradient(to top, #78350f, var(--bronze)); border: 3px solid var(--bronze); }

        /* Karty */
        .card { background: var(--bg-glass); padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
        input { padding: 12px; border: 2px solid #cbd5e1; border-radius: 10px; }
        button { padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        /* Tabela */
        table { width: 100%; border-collapse: collapse; }
        th { padding: 15px; text-align: left; border-bottom: 3px solid var(--primary); color: var(--primary); font-size: 13px; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #e2e8f0; }
        .edit-input { width: 50px; padding: 6px; border-radius: 6px; border: 1px solid #94a3b8; text-align: center; }

        .widgets { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .widget { background: var(--bg-glass); padding: 20px; border-radius: 15px; border-top: 5px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="club-header">
        <img src="IMG_3003.png" alt="Logo SEMP" class="club-logo">
        <h1>SEMP WARSZAWA - LIVE RANKING</h1>
    </div>

    <!-- PODIUM -->
    <div class="podium-container">
        <div class="podium-place second"><div class="name-tag" id="p2-name">-</div><div class="podium-bar">2</div></div>
        <div class="podium-place first"><div class="name-tag" id="p1-name">-</div><div class="podium-bar">1</div></div>
        <div class="podium-place third"><div class="name-tag" id="p3-name">-</div><div class="podium-bar">3</div></div>
    </div>

    <!-- PANEL DODAWANIA -->
    <div class="card">
        <div class="form-grid">
            <input type="text" id="pName" placeholder="Imię i Nazwisko">
            <input type="number" id="pWins" placeholder="Zwycięstwa (3pkt)">
            <input type="number" id="pGoals" placeholder="Gole (1pkt)">
            <input type="number" id="pAssists" placeholder="Asysty (1pkt)">
            <button onclick="addOrUpdatePlayer()">ZAPISZ W CHMURZE</button>
        </div>
    </div>

    <!-- TABELA -->
    <div class="card" style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Poz.</th>
                    <th>Zawodnik</th>
                    <th>W (x3)</th>
                    <th>G (x1)</th>
                    <th>A (x1)</th>
                    <th>Suma</th>
                    <th>Akcja</th>
                </tr>
            </thead>
            <tbody id="playerBody"></tbody>
        </table>
    </div>

    <div class="widgets">
        <div class="widget"><h4>🔥 Król Strzelców</h4><div id="sideGoals"></div></div>
        <div class="widget"><h4>🎯 Najlepsi Asystenci</h4><div id="sideAssists"></div></div>
    </div>
</div>

<script>
    // ========== KONFIGURACJA FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyAbMTVozOhIXesvF59REYnIOtmo-V5qimk",
        authDomain: "forevermagazyn.firebaseapp.com",
        projectId: "forevermagazyn",
        storageBucket: "forevermagazyn.firebasestorage.app",
        messagingSenderId: "251843942343",
        appId: "1:251843942343:web:2c81227b12ab4ad0052be2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const playersCol = db.collection('players');

    // Funkcja dodawania / aktualizacji[span_4](start_span)[span_4](end_span)
    async function addOrUpdatePlayer() {
        const name = document.getElementById('pName').value.trim();
        const wins = parseInt(document.getElementById('pWins').value) || 0;
        const goals = parseInt(document.getElementById('pGoals').value) || 0;
        const assists = parseInt(document.getElementById('pAssists').value) || 0;

        if (!name) return alert("Podaj nazwisko!");

        const docId = name.toLowerCase().replace(/\s+/g, '_');
        const docRef = playersCol.doc(docId);
        const doc = await docRef.get();

        if (doc.exists) {
            await docRef.update({
                wins: firebase.firestore.FieldValue.increment(wins),
                goals: firebase.firestore.FieldValue.increment(goals),
                assists: firebase.firestore.FieldValue.increment(assists)
            });
        } else {
            await docRef.set({ name, wins, goals, assists });
        }

        document.querySelectorAll('input').forEach(i => i.value = "");
    }

    // Funkcja usuwania
    function deletePlayer(id) {
        if (confirm("Usunąć zawodnika?")) playersCol.doc(id).delete();
    }

    // Funkcja bezpośredniej edycji[span_5](start_span)[span_5](end_span)
    function updateValue(id, field, value) {
        const updateData = {};
        updateData[field] = parseInt(value) || 0;
        playersCol.doc(id).update(updateData);
    }

    // Słuchacz bazy danych w czasie rzeczywistym[span_6](start_span)[span_6](end_span)[span_7](start_span)[span_7](end_span)
    playersCol.onSnapshot(snapshot => {
        const players = [];
        snapshot.forEach(doc => players.push({ id: doc.id, ...doc.data() }));
        render(players);
    });

    function render(players) {
        const sorted = players.map(p => ({
            ...p,
            total: (p.wins * 3) + p.goals + p.assists
        })).sort((a, b) => b.total - a.total);

        // Tabela główna
        const body = document.getElementById('playerBody');
        body.innerHTML = sorted.map((p, i) => `
            <tr class="${i === 0 ? 'rank-1-row' : ''}">
                <td><b>${i+1}</b></td>
                <td>${p.name}</td>
                <td><input type="number" class="edit-input" value="${p.wins}" onchange="updateValue('${p.id}', 'wins', this.value)"></td>
                <td><input type="number" class="edit-input" value="${p.goals}" onchange="updateValue('${p.id}', 'goals', this.value)"></td>
                <td><input type="number" class="edit-input" value="${p.assists}" onchange="updateValue('${p.id}', 'assists', this.value)"></td>
                <td style="color:var(--primary); font-weight:bold;">${p.total}</td>
                <td><button onclick="deletePlayer('${p.id}')" style="background:#444; font-size:10px;">X</button></td>
            </tr>
        `).join('');

        // Podium[span_8](start_span)[span_8](end_span)
        document.getElementById('p1-name').innerText = sorted[0] ? sorted[0].name : "-";
        document.getElementById('p2-name').innerText = sorted[1] ? sorted[1].name : "-";
        document.getElementById('p3-name').innerText = sorted[2] ? sorted[2].name : "-";

        // Topki boczne
        const fillTop = (id, field) => {
            const top = [...players].sort((a,b) => b[field] - a[field]).slice(0, 3);
            document.getElementById(id).innerHTML = top.map(p => `
                <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px dashed #ccc;">
                    <span>${p.name}</span><b>${p[field]}</b>
                </div>
            `).join('');
        };
        fillTop('sideGoals', 'goals');
        fillTop('sideAssists', 'assists');
    }
</script>

</body>
</html>
