<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking SEMP Warszawa</title>
    <style>
        :root {
            --primary: #c41e3a; /* Czerwień klubowa */
            --dark: #000000;    /* Czarny klubowy */
            --accent: #3b82f6;
            --gold: #fbbf24;
            --silver: #94a3b8;
            --bronze: #a16207;
            --bg-glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #1e293b;
            position: relative;
            background: #000;
        }

        /* Tło z logo */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Logo_SEMP_Warszawa.png/600px-Logo_SEMP_Warszawa.png'), 
                              url('image.png'); /* Próbuje załadować Twój plik lub logo z sieci */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.3;
            filter: blur(5px);
            z-index: -1;
        }

        .container { width: 100%; max-width: 1000px; z-index: 1; }

        /* Nagłówek klubowy */
        .club-header {
            text-align: center;
            margin-bottom: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .club-logo-small {
            height: 100px;
            margin-bottom: 10px;
        }

        /* Podium */
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            margin: 30px 0;
            height: 200px;
        }

        .podium-place { display: flex; flex-direction: column; align-items: center; width: 120px; }
        .podium-bar {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 24px;
            border-radius: 8px 8px 0 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .name-tag { font-size: 14px; font-weight: bold; margin-bottom: 8px; color: white; text-align: center; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 10px; }
        
        .first { order: 2; }
        .first .podium-bar { height: 130px; background: linear-gradient(to top, #b45309, var(--gold)); border: 2px solid var(--gold); }
        .second { order: 1; }
        .second .podium-bar { height: 90px; background: linear-gradient(to top, #475569, var(--silver)); border: 2px solid var(--silver); }
        .third { order: 3; }
        .third .podium-bar { height: 65px; background: linear-gradient(to top, #78350f, var(--bronze)); border: 2px solid var(--bronze); }

        /* Karty i Formularz */
        .card {
            background: var(--bg-glass);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            backdrop-filter: blur(4px);
        }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-weight: bold; }
        button { padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #9b1a2f; transform: scale(1.02); }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px; text-align: left; border-bottom: 2px solid var(--primary); color: var(--primary); font-size: 12px; text-transform: uppercase; }
        td { padding: 10px 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background: rgba(196, 30, 58, 0.05); }
        
        .rank-1 { background: rgba(251, 191, 36, 0.15) !important; font-weight: bold; }
        .edit-input { width: 45px; padding: 5px; border-radius: 4px; border: 1px solid #bbb; text-align: center; font-weight: bold; }

        .widgets { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }
        .widget { background: var(--bg-glass); padding: 15px; border-radius: 12px; border-top: 4px solid var(--primary); }
        .top-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #ccc; }
    </style>
</head>
<body>

<div class="container">
    <div class="club-header">
        <img src="image.png" alt="Logo SEMP" class="club-logo-small" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Logo_SEMP_Warszawa.png/600px-Logo_SEMP_Warszawa.png'">
        <h1>RANKING SEMP WARSZAWA</h1>
    </div>

    <div class="podium-container">
        <div class="podium-place second">
            <div class="name-tag" id="p2-name">-</div>
            <div class="podium-bar">2</div>
        </div>
        <div class="podium-place first">
            <div class="name-tag" id="p1-name">-</div>
            <div class="podium-bar">1</div>
        </div>
        <div class="podium-place third">
            <div class="name-tag" id="p3-name">-</div>
            <div class="podium-bar">3</div>
        </div>
    </div>

    <div class="card">
        <div class="form-grid">
            <input type="text" id="pName" placeholder="Imię i Nazwisko">
            <input type="number" id="pWins" placeholder="Wygrane (3pkt)">
            <input type="number" id="pGoals" placeholder="Gole (1pkt)">
            <input type="number" id="pAssists" placeholder="Asysty (1pkt)">
            <button id="addBtn">DODAJ DANE</button>
        </div>
    </div>

    <div class="card" style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Poz.</th>
                    <th>Zawodnik</th>
                    <th>Zwyc</th>
                    <th>Gole</th>
                    <th>Asysty</th>
                    <th>Punkty</th>
                    <th>Usuń</th>
                </tr>
            </thead>
            <tbody id="playerBody"></tbody>
        </table>
    </div>

    <div class="widgets">
        <div class="widget"><h4>⚽ Najlepsi Strzelcy</h4><div id="sideGoals"></div></div>
        <div class="widget"><h4>🎯 Najlepsi Asystenci</h4><div id="sideAssists"></div></div>
    </div>
</div>

<script>
    let players = JSON.parse(localStorage.getItem('semp_stats_v1')) || [];

    function saveAndRender() {
        localStorage.setItem('semp_stats_v1', JSON.stringify(players));
        render();
    }

    document.getElementById('addBtn').addEventListener('click', function() {
        const name = document.getElementById('pName').value.trim();
        const wins = parseInt(document.getElementById('pWins').value) || 0;
        const goals = parseInt(document.getElementById('pGoals').value) || 0;
        const assists = parseInt(document.getElementById('pAssists').value) || 0;

        if(!name) return;

        const idx = players.findIndex(p => p.name.toLowerCase() === name.toLowerCase());
        if(idx > -1) {
            players[idx].wins += wins;
            players[idx].goals += goals;
            players[idx].assists += assists;
        } else {
            players.push({ name, wins, goals, assists });
        }

        document.querySelectorAll('input').forEach(i => i.value = "");
        saveAndRender();
    });

    function updateVal(index, field, val) {
        players[index][field] = parseInt(val) || 0;
        saveAndRender();
    }

    function removeP(index) {
        if(confirm("Usunąć zawodnika?")) {
            players.splice(index, 1);
            saveAndRender();
        }
    }

    function render() {
        const sorted = players.map((p, i) => ({
            ...p, 
            originalIndex: i,
            total: (p.wins * 3) + p.goals + p.assists
        })).sort((a, b) => b.total - a.total);

        const body = document.getElementById('playerBody');
        body.innerHTML = "";

        sorted.forEach((p, i) => {
            const row = document.createElement('tr');
            if(i === 0) row.className = 'rank-1';
            row.innerHTML = `
                <td>${i+1}</td>
                <td>${p.name}</td>
                <td><input type="number" class="edit-input" value="${p.wins}" onchange="updateVal(${p.originalIndex}, 'wins', this.value)"></td>
                <td><input type="number" class="edit-input" value="${p.goals}" onchange="updateVal(${p.originalIndex}, 'goals', this.value)"></td>
                <td><input type="number" class="edit-input" value="${p.assists}" onchange="updateVal(${p.originalIndex}, 'assists', this.value)"></td>
                <td style="color:var(--primary); font-weight:bold;">${p.total}</td>
                <td><button onclick="removeP(${p.originalIndex})" style="background:#444; padding:2px 8px;">X</button></td>
            `;
            body.appendChild(row);
        });

        // Podium
        document.getElementById('p1-name').innerText = sorted[0] ? sorted[0].name : "-";
        document.getElementById('p2-name').innerText = sorted[1] ? sorted[1].name : "-";
        document.getElementById('p3-name').innerText = sorted[2] ? sorted[2].name : "-";

        // Widgety
        const fill = (id, field) => {
            const top = [...players].sort((a,b) => b[field] - a[field]).slice(0, 3);
            document.getElementById(id).innerHTML = top.map(p => `
                <div class="top-row"><span>${p.name}</span><b>${p[field]}</b></div>
            `).join('');
        };
        fill('sideGoals', 'goals');
        fill('sideAssists', 'assists');
    }

    render();
</script>

</body>
</html>
