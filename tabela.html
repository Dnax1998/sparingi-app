<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Mistrzów - Podium</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --gold: #fbbf24;
            --silver: #94a3b8;
            --bronze: #a16207;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 1000px; }

        /* Podium Style */
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            margin: 40px 0;
            height: 220px;
        }

        .podium-place {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 130px;
        }

        .podium-bar {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 28px;
            border-radius: 10px 10px 0 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .name-tag {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            color: var(--primary);
            word-break: break-word;
        }

        .first { order: 2; }
        .first .podium-bar { height: 150px; background: linear-gradient(to top, #d97706, var(--gold)); border: 2px solid #f59e0b; }
        
        .second { order: 1; }
        .second .podium-bar { height: 110px; background: linear-gradient(to top, #475569, var(--silver)); border: 2px solid #64748b; }
        
        .third { order: 3; }
        .third .podium-bar { height: 80px; background: linear-gradient(to top, #78350f, var(--bronze)); border: 2px solid #92400e; }

        /* Form & Cards */
        .card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        input {
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        button {
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th { padding: 15px; text-align: left; border-bottom: 2px solid #f1f5f9; color: #64748b; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; }

        .edit-input { width: 50px; padding: 5px; border: 1px solid #cbd5e1; border-radius: 5px; text-align: center; }

        .top-widgets {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .widget { background: white; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .top-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #eee; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">🏆 Tabela Wyników Drużyny</h2>

    <!-- PODIUM -->
    <div class="podium-container">
        <div class="podium-place second">
            <div class="name-tag" id="p2-name">-</div>
            <div class="podium-bar">2</div>
        </div>
        <div class="podium-place first">
            <div class="name-tag" id="p1-name">-</div>
            <div class="podium-bar">1</div>
        </div>
        <div class="podium-place third">
            <div class="name-tag" id="p3-name">-</div>
            <div class="podium-bar">3</div>
        </div>
    </div>

    <!-- FORMULARZ -->
    <div class="card">
        <div class="form-grid">
            <input type="text" id="pName" placeholder="Imię i Nazwisko">
            <input type="number" id="pWins" placeholder="Zwycięstwa (x3)">
            <input type="number" id="pGoals" placeholder="Gole (x1)">
            <input type="number" id="pAssists" placeholder="Asysty (x1)">
            <button id="addBtn">DODAJ / AKTUALIZUJ</button>
        </div>
    </div>

    <!-- TABELA -->
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Poz.</th>
                    <th>Zawodnik</th>
                    <th>W (x3)</th>
                    <th>Gole</th>
                    <th>Asysty</th>
                    <th>Suma</th>
                    <th>Opcje</th>
                </tr>
            </thead>
            <tbody id="playerBody"></tbody>
        </table>
    </div>

    <!-- TOPKI BOCZNE -->
    <div class="top-widgets">
        <div class="widget"><h4>⚽ Najwięcej Goli</h4><div id="sideGoals"></div></div>
        <div class="widget"><h4>🎯 Najwięcej Asyst</h4><div id="sideAssists"></div></div>
    </div>
</div>

<script>
    // Inicjalizacja danych z pamięci[span_4](start_span)[span_4](end_span)
    let players = JSON.parse(localStorage.getItem('stats_final_v3')) || [];

    function saveAndRender() {
        localStorage.setItem('stats_final_v3', JSON.stringify(players));
        render();
    }

    // Obsługa przycisku dodawania[span_5](start_span)[span_5](end_span)
    document.getElementById('addBtn').addEventListener('click', function() {
        const name = document.getElementById('pName').value.trim();
        const wins = parseInt(document.getElementById('pWins').value) || 0;
        const goals = parseInt(document.getElementById('pGoals').value) || 0;
        const assists = parseInt(document.getElementById('pAssists').value) || 0;

        if(!name) { alert("Wpisz imię zawodnika!"); return; }

        const existingIdx = players.findIndex(p => p.name.toLowerCase() === name.toLowerCase());
        
        if(existingIdx > -1) {
            players[existingIdx].wins += wins;
            players[existingIdx].goals += goals;
            players[existingIdx].assists += assists;
        } else {
            players.push({ name, wins, goals, assists });
        }

        // Czyszczenie pól
        document.getElementById('pName').value = "";
        document.getElementById('pWins').value = "";
        document.getElementById('pGoals').value = "";
        document.getElementById('pAssists').value = "";
        
        saveAndRender();
    });

    function updateDirectly(index, field, val) {
        players[index][field] = parseInt(val) || 0;
        saveAndRender();
    }

    function removePlayer(index) {
        if(confirm("Usunąć zawodnika?")) {
            players.splice(index, 1);
            saveAndRender();
        }
    }

    function render() {
        // Kalkulacja punktów i sortowanie[span_6](start_span)[span_6](end_span)[span_7](start_span)[span_7](end_span)
        const sortedData = players.map((p, originalIndex) => ({
            ...p,
            originalIndex,
            total: (p.wins * 3) + p.goals + p.assists
        })).sort((a, b) => b.total - a.total);

        const body = document.getElementById('playerBody');
        body.innerHTML = "";

        sortedData.forEach((p, i) => {
            const row = document.createElement('tr');
            if(i === 0) row.style.backgroundColor = "rgba(251, 191, 36, 0.1)"; // Złote podświetlenie lidera[span_8](start_span)[span_8](end_span)
            
            row.innerHTML = `
                <td><b>${i+1}</b></td>
                <td>${p.name}</td>
                <td><input type="number" class="edit-input" value="${p.wins}" onchange="updateDirectly(${p.originalIndex}, 'wins', this.value)"></td>
                <td><input type="number" class="edit-input" value="${p.goals}" onchange="updateDirectly(${p.originalIndex}, 'goals', this.value)"></td>
                <td><input type="number" class="edit-input" value="${p.assists}" onchange="updateDirectly(${p.originalIndex}, 'assists', this.value)"></td>
                <td><b style="color:var(--accent)">${p.total}</b></td>
                <td><button onclick="removePlayer(${p.originalIndex})" style="background:#ef4444; padding:5px 10px; font-size:11px;">Usuń</button></td>
            `;
            body.appendChild(row);
        });

        // Aktualizacja Podium[span_9](start_span)[span_9](end_span)
        document.getElementById('p1-name').innerText = sortedData[0] ? sortedData[0].name : "-";
        document.getElementById('p2-name').innerText = sortedData[1] ? sortedData[1].name : "-";
        document.getElementById('p3-name').innerText = sortedData[2] ? sortedData[2].name : "-";

        // Aktualizacja Top Strzelców i Asystentów
        const updateMini = (id, field) => {
            const top = [...players].sort((a,b) => b[field] - a[field]).slice(0, 3);
            document.getElementById(id).innerHTML = top.map(p => `
                <div class="top-row"><span>${p.name}</span><b>${p[field]}</b></div>
            `).join('');
        };
        updateMini('sideGoals', 'goals');
        updateMini('sideAssists', 'assists');
    }

    render();
</script>

</body>
</html>
